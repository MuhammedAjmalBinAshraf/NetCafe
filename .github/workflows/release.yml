name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root deps
        run: npm install

      - name: Install server deps
        working-directory: packages/server
        run: npm install

      - name: Build server (Windows)
        working-directory: packages/server
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: false

      - name: Install agent deps
        working-directory: packages/agent
        run: npm install

      - name: Build agent (Windows)
        working-directory: packages/agent
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List server release files
        run: ls -la packages/server/release/ || echo "No server release files"

      - name: List agent release files
        run: ls -la packages/agent/release/ || echo "No agent release files"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          if-no-files-found: warn
          path: |
            packages/server/release/*.exe
            packages/agent/release/*.exe

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm libarchive-tools python3 make g++

      - name: Install root deps
        run: npm install

      - name: Install server deps
        working-directory: packages/server
        run: npm install

      - name: Build server (Linux)
        working-directory: packages/server
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install agent deps
        working-directory: packages/agent
        run: npm install

      - name: Build agent (Linux)
        working-directory: packages/agent
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release files
        run: |
          ls -la packages/server/release/ || echo "No server release files"
          ls -la packages/agent/release/ || echo "No agent release files"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          if-no-files-found: warn
          path: |
            packages/server/release/*.deb
            packages/server/release/*.AppImage
            packages/agent/release/*.deb
            packages/agent/release/*.AppImage

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: builds/win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: builds/linux

      - name: Rename and collect release files
        run: |
          mkdir -p final-release

          # Server Windows
          SERVER_EXE=$(find builds/win -name "*.exe" | grep -i "server" | head -1)
          if [ -n "$SERVER_EXE" ]; then cp "$SERVER_EXE" final-release/NetCafe-Server-Setup.exe; fi

          # Agent Windows
          AGENT_EXE=$(find builds/win -name "*.exe" | grep -i "agent" | head -1)
          if [ -n "$AGENT_EXE" ]; then cp "$AGENT_EXE" final-release/NetCafe-Agent-Setup.exe; fi

          # Server Linux
          SERVER_DEB=$(find builds/linux -name "*.deb" | grep -i "server" | head -1)
          if [ -n "$SERVER_DEB" ]; then cp "$SERVER_DEB" final-release/NetCafe-Server.deb; fi

          SERVER_IMG=$(find builds/linux -name "*.AppImage" | grep -i "server" | head -1)
          if [ -n "$SERVER_IMG" ]; then cp "$SERVER_IMG" final-release/NetCafe-Server.AppImage; fi

          # Agent Linux
          AGENT_DEB=$(find builds/linux -name "*.deb" | grep -i "agent" | head -1)
          if [ -n "$AGENT_DEB" ]; then cp "$AGENT_DEB" final-release/NetCafe-Agent.deb; fi

          AGENT_IMG=$(find builds/linux -name "*.AppImage" | grep -i "agent" | head -1)
          if [ -n "$AGENT_IMG" ]; then cp "$AGENT_IMG" final-release/NetCafe-Agent.AppImage; fi

          echo "=== Files ready for release ==="
          ls -lh final-release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: final-release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
