name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      electron_config_cache: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install root deps
        run: npm install --prefer-offline
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1


      - name: Build server (Windows)
        working-directory: packages/server
        run: npm run build:win:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: false
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder


      - name: Build agent (Windows)
        working-directory: packages/agent
        run: npm run build:win:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

      - name: List server release files
        run: ls -la packages/server/release/ || echo "No server release files"

      - name: List agent release files
        run: ls -la packages/agent/release/ || echo "No agent release files"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          if-no-files-found: warn
          path: |
            packages/server/release/*.exe
            packages/agent/release/*.exe

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    if: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm libarchive-tools python3 make g++

      - name: Install root deps
        run: npm install


      - name: Build server (Linux)
        working-directory: packages/server
        run: npm run build:linux:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Build agent (Linux)
        working-directory: packages/agent
        run: npm run build:linux:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release files
        run: |
          ls -la packages/server/release/ || echo "No server release files"
          ls -la packages/agent/release/ || echo "No agent release files"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          if-no-files-found: warn
          path: |
            packages/server/release/*.deb
            packages/server/release/*.AppImage
            packages/agent/release/*.deb
            packages/agent/release/*.AppImage

  release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: builds/win

      - name: Rename and collect release files
        run: |
          mkdir -p final-release

          # Server Windows
          SERVER_EXE=$(find builds/win -name "*.exe" | grep -i "server" | head -1)
          if [ -n "$SERVER_EXE" ]; then cp "$SERVER_EXE" final-release/NetCafe-Server-Setup.exe; fi

          # Agent Windows
          AGENT_EXE=$(find builds/win -name "*.exe" | grep -i "agent" | head -1)
          if [ -n "$AGENT_EXE" ]; then cp "$AGENT_EXE" final-release/NetCafe-Agent-Setup.exe; fi

          echo "=== Files ready for release ==="
          ls -lh final-release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: final-release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
